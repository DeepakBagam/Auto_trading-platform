services:
  - type: web
    name: trading-api
    env: python
    buildCommand: pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: EXECUTION_ENABLED
        value: "false"
    
  - type: worker
    name: trading-execution
    env: python
    buildCommand: pip install -e .
    startCommand: python scripts/start_execution_loop.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: EXECUTION_ENABLED
        value: "true"
      - key: EXECUTION_MODE
        value: "paper"
    
  - type: worker
    name: trading-stream
    env: python
    buildCommand: pip install -e .
    startCommand: python scripts/start_market_stream.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: trading-db
    databaseName: trading
    user: trading_user
