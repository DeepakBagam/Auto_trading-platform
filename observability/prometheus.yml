global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'trading-platform'
    environment: 'production'

scrape_configs:
  # FastAPI application metrics
  - job_name: 'trading_api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # Celery worker metrics (if exposed)
  - job_name: 'celery_worker'
    static_configs:
      - targets: ['celery_worker:9090']

  # Redis metrics (if redis_exporter is added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # PostgreSQL metrics (if postgres_exporter is added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
